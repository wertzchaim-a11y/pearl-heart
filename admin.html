<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Heart of The Pearl</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FAF6F2; color: #2C2018; min-height: 100vh; }

    .topbar {
      background: #7A4E2D; color: #FDF5EC; padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between; height: 56px;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar img { height: 32px; filter: brightness(0) invert(1); opacity: 0.9; }
    .topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; }
    .topbar-right { font-size: 13px; opacity: 0.8; }

    .main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 2rem; }
    .stat { background: #fff; border: 1px solid #D4B89A; border-radius: 12px; padding: 1rem 1.25rem; }
    .stat-label { font-size: 12px; color: #9C8060; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 600; color: #7A4E2D; }

    .controls { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .controls input, .controls select {
      padding: 8px 12px; font-size: 14px; border: 1px solid #D4B89A;
      border-radius: 8px; background: #fff; font-family: inherit; color: #2C2018; outline: none;
    }
    .controls input { flex: 1; min-width: 200px; }
    .controls input:focus, .controls select:focus { border-color: #A0714F; }
    .btn-export {
      padding: 8px 16px; font-size: 14px; font-weight: 600; font-family: inherit;
      background: #7A4E2D; color: #FDF5EC; border: none; border-radius: 8px; cursor: pointer;
    }
    .btn-export:hover { background: #5C3820; }

    .nominations { display: grid; gap: 12px; }
    .nom-card { background: #fff; border: 1px solid #D4B89A; border-radius: 12px; padding: 1.25rem; }
    .nom-card.winner { border: 2px solid #A0714F; background: #FFFBF5; }
    .nom-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 12px; }
    .nom-employee { font-size: 16px; font-weight: 600; color: #2C2018; }
    .nom-dept { font-size: 12px; color: #9C8060; margin-top: 2px; }
    .nom-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .nom-stars { color: #A0714F; font-size: 14px; letter-spacing: 1px; }
    .nom-date { font-size: 12px; color: #B09878; }
    .nom-message { font-size: 14px; color: #3C2810; line-height: 1.65; border-left: 3px solid #D4B89A; padding-left: 12px; margin-bottom: 10px; }
    .nom-from { font-size: 12px; color: #9C8060; }
    .nom-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 1px solid #EDE0D0; }
    .badge-winner { background: #7A4E2D; color: #FDF5EC; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.04em; }
    .btn-mark-winner {
      font-size: 12px; font-weight: 600; font-family: inherit; padding: 5px 14px;
      background: transparent; border: 1px solid #A0714F; color: #7A4E2D; border-radius: 6px; cursor: pointer;
    }
    .btn-mark-winner:hover { background: #F5EBE0; }
    .empty { text-align: center; padding: 4rem 2rem; color: #9C8060; }
    .empty p { font-size: 15px; }

    .login-overlay {
      position: absolute; inset: 0; background: #FAF6F2;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .login-box { background: #fff; border: 1px solid #D4B89A; border-radius: 14px; padding: 2rem; width: 320px; text-align: center; }
    .login-box img { max-width: 160px; margin: 0 auto 1.25rem; display: block; }
    .login-box h2 { font-size: 16px; font-weight: 600; color: #7A4E2D; margin-bottom: 1.25rem; }
    .login-box input { width: 100%; padding: 10px 12px; font-size: 15px; font-family: inherit; border: 1px solid #D4B89A; border-radius: 8px; margin-bottom: 12px; outline: none; }
    .login-box input:focus { border-color: #A0714F; }
    .btn-login { width: 100%; padding: 12px; font-size: 15px; font-weight: 600; font-family: inherit; background: #7A4E2D; color: #FDF5EC; border: none; border-radius: 8px; cursor: pointer; }
    .btn-login:hover { background: #5C3820; }
    .login-err { font-size: 13px; color: #C0392B; margin-top: 8px; display: none; }
  </style>
</head>
<body>

  <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <img src="logo.jpg" alt="The Pearl" />
      <h2>Admin — Heart of The Pearl</h2>
      <input type="password" id="passInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()" />
      <button class="btn-login" onclick="doLogin()">Sign in</button>
      <p class="login-err" id="loginErr">Incorrect password</p>
    </div>
  </div>

  <div id="adminApp" style="display:none;">
    <div class="topbar">
      <div class="topbar-left">
        <img src="logo.jpg" alt="The Pearl" />
        <h1>Heart of The Pearl — Admin</h1>
      </div>
      <div class="topbar-right" id="monthLabel"></div>
    </div>

    <div class="main">
      <div class="stats">
        <div class="stat"><div class="stat-label">Total nominations</div><div class="stat-value" id="statTotal">0</div></div>
        <div class="stat"><div class="stat-label">This month</div><div class="stat-value" id="statMonth">0</div></div>
        <div class="stat"><div class="stat-label">Unique employees</div><div class="stat-value" id="statUnique">0</div></div>
        <div class="stat"><div class="stat-label">Avg rating</div><div class="stat-value" id="statRating">—</div></div>
      </div>

      <div class="controls">
        <input type="text" id="searchInput" placeholder="Search by employee name..." oninput="renderNoms()" />
        <select id="monthFilter" onchange="renderNoms()">
          <option value="all">All time</option>
          <option value="this">This month</option>
        </select>
        <select id="deptFilter" onchange="renderNoms()">
          <option value="">All departments</option>
          <option>Nursing</option>
          <option>Physical Therapy</option>
          <option>Occupational Therapy</option>
          <option>Activities</option>
          <option>Dietary</option>
          <option>Housekeeping</option>
          <option>Administration</option>
          <option>Social Work</option>
          <option>Other</option>
        </select>
        <button class="btn-export" onclick="exportCSV()">Export CSV</button>
      </div>

      <div id="loadingBar" style="text-align:center;padding:2rem;color:#9C8060;font-size:14px;">Loading nominations...</div>
      <div class="nominations" id="nomList"></div>
    </div>
  </div>

  <script>
    const ADMIN_PASS = 'pearl2024';
    let allNoms = [];
    let winners = JSON.parse(localStorage.getItem('pearl_winners') || '[]');
    // NOTE: winners are stored in this browser only. Always use the same device/browser for admin.

    function doLogin() {
      const val = document.getElementById('passInput').value;
      if (val === ADMIN_PASS) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('adminApp').style.display = 'block';
        loadNoms();
      } else {
        document.getElementById('loginErr').style.display = 'block';
      }
    }

    async function loadNoms() {
      try {
        const res = await fetch('/api/nominations', {
          headers: { 'x-admin-key': ADMIN_PASS }
        });
        if (!res.ok) throw new Error('Auth failed');
        const data = await res.json();
        allNoms = Array.isArray(data) ? data : [];
      } catch {
        allNoms = [];
      }
      const lb = document.getElementById('loadingBar');
      if (lb) lb.style.display = 'none';
      updateStats();
      renderNoms();
      document.getElementById('monthLabel').textContent = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
    }

    function updateStats() {
      const now = new Date();
      const thisMonth = allNoms.filter(n => {
        const d = new Date(n.date);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      });
      const unique = [...new Set(allNoms.map(n => n.empName.toLowerCase().trim()))];
      const rated = allNoms.filter(n => n.rating > 0);
      const avg = rated.length ? (rated.reduce((s, n) => s + n.rating, 0) / rated.length).toFixed(1) : '—';
      document.getElementById('statTotal').textContent = allNoms.length;
      document.getElementById('statMonth').textContent = thisMonth.length;
      document.getElementById('statUnique').textContent = unique.length;
      document.getElementById('statRating').textContent = avg;
    }

    function renderNoms() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const month = document.getElementById('monthFilter').value;
      const dept = document.getElementById('deptFilter').value;
      const now = new Date();

      let filtered = allNoms.filter(n => {
        if (search && !n.empName.toLowerCase().includes(search)) return false;
        if (dept && n.dept !== dept) return false;
        if (month === 'this') {
          const d = new Date(n.date);
          if (d.getMonth() !== now.getMonth() || d.getFullYear() !== now.getFullYear()) return false;
        }
        return true;
      });

      filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

      const container = document.getElementById('nomList');
      if (!filtered.length) {
        container.innerHTML = '<div class="empty"><p>No nominations found.</p></div>';
        return;
      }

      container.innerHTML = filtered.map((n, i) => {
        const isWinner = winners.includes(n.id);
        const stars = n.rating ? '★'.repeat(n.rating) + '☆'.repeat(5 - n.rating) : '';
        const date = new Date(n.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        return `
          <div class="nom-card ${isWinner ? 'winner' : ''}" id="card-${n.id}">
            <div class="nom-header">
              <div>
                <div class="nom-employee">${esc(n.empName)}</div>
                <div class="nom-dept">${n.dept || 'Department not specified'}</div>
              </div>
              <div class="nom-meta">
                ${stars ? `<span class="nom-stars">${stars}</span>` : ''}
                <span class="nom-date">${date}</span>
              </div>
            </div>
            <div class="nom-message">"${esc(n.message)}"</div>
            ${n.nomName ? `<div class="nom-from">— ${esc(n.nomName)}</div>` : ''}
            ${n.phone ? `<div class="nom-from" style="color:#3B6D11">📞 ${esc(n.phone)}</div>` : ''}
            <div class="nom-footer">
              ${isWinner ? '<span class="badge-winner">🏆 Monthly winner</span>' : '<span></span>'}
              <button class="btn-mark-winner" onclick="toggleWinner('${n.id}')">
                ${isWinner ? 'Remove winner' : 'Mark as winner'}
              </button>
            </div>
          </div>`;
      }).join('');
    }

    function toggleWinner(id) {
      if (winners.includes(id)) {
        winners = winners.filter(w => w !== id);
      } else {
        winners.push(id);
      }
      localStorage.setItem('pearl_winners', JSON.stringify(winners));
      renderNoms();
    }

    function esc(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function exportCSV() {
      const rows = [['Date','Employee','Department','Message','Submitted By','Rating','Winner']];
      allNoms.forEach(n => {
        rows.push([
          new Date(n.date).toLocaleDateString(),
          n.empName, n.dept || '', n.message,
          n.nomName || '', n.rating || '',
          winners.includes(n.id) ? 'Yes' : 'No'
        ]);
      });
      const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = `pearl-nominations-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    }
  </script>
</body>
</html>
